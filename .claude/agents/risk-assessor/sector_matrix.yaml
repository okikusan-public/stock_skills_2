# Sector/Theme Recommendation Matrix
# Risk Assessor が市況指標からセクター推奨を生成するための固定ルール
# 最終検証: 2026-04-24（3LLMスワム + 5者レビュー承認済み）

# マクロ指標 → 有利/不利セクターの対応表
rules:
  - condition: "金利↑（TNX上昇トレンド4w）AND ISM > 50"
    favorable: ["金融", "資本財"]
    unfavorable: ["公益", "不動産", "グローステック"]
    etfs: {favorable: ["XLF", "XLI"], unfavorable: ["XLU", "XLRE"]}
    rationale: "好景気+金利上昇は利ざや拡大で金融に追い風。高PER・長期債的セクターに逆風"

  - condition: "原油↑（WTI > $85 AND 上昇トレンド4w）"
    favorable: ["エネルギー"]
    unfavorable: ["航空", "化学"]
    etfs: {favorable: ["XLE"], unfavorable: []}
    rationale: "原油高はエネルギー企業の収益を直接押し上げ"

  - condition: "ISM < 47 AND VIX > 25"
    favorable: ["ヘルスケア", "公益", "生活必需品", "金"]
    unfavorable: ["テクノロジー", "一般消費財", "資本財"]
    etfs: {favorable: ["XLV", "XLU", "XLP", "GLD"], unfavorable: ["XLK", "XLY", "XLI"]}
    rationale: "景気後退局面。ディフェンシブセクターに資金が逃避"

  - condition: "金利↓（TNX下降トレンド4w）"
    favorable: ["テクノロジー", "グロース", "不動産"]
    unfavorable: ["金融"]
    etfs: {favorable: ["XLK", "XLRE"], unfavorable: ["XLF"]}
    rationale: "金利低下はグロース株のバリュエーション拡大に寄与"

  - condition: "地政学リスク = 高（Step 5 で検出）"
    favorable: ["防衛", "金"]
    unfavorable: ["消費", "旅行"]
    etfs: {favorable: ["ITA", "GLD"], unfavorable: []}
    rationale: "地政学緊張は防衛需要と安全資産需要を高める"

  - condition: "ISM > 55（強い拡大）"
    favorable: ["資本財", "素材", "一般消費財"]
    unfavorable: ["公益", "生活必需品"]
    etfs: {favorable: ["XLI", "XLB", "XLY"], unfavorable: ["XLU", "XLP"]}
    rationale: "強い景気拡大ではシクリカルセクターが恩恵"

  - condition: "逆イールド（YC < 0）"
    favorable: ["現金", "短期債"]
    unfavorable: ["金融", "全リスク資産"]
    etfs: {favorable: ["SHV", "BIL"], unfavorable: ["XLF"]}
    rationale: "逆イールドは景気後退の先行指標。リスク資産全般に警戒"

# 複数条件の重複処理
overlap_rules:
  - "複数条件に該当する場合、全該当テーマを列挙する"
  - "同じセクターが複数条件で推奨される場合は「強い推奨」とマーク"
  - "favorable と unfavorable が同じセクターで衝突した場合、直近の条件を優先"

# PF規模別の適用範囲
scale_rules:
  small:  # 〜$50K
    description: "固定ルールのみ。RS計算・Grok検証なし"
    apply: ["rules"]  # このマトリックスだけ適用
    frequency: "月次"
    max_trades: 1  # 月1回まで
  medium:  # $50K〜$200K
    description: "固定ルール + RS計算 + Grok検証"
    apply: ["rules", "rs", "grok"]
    frequency: "月次"
    max_trades: 1  # 四半期1回（月換算で約0.33回だが月1を上限）
  large:  # $200K〜
    description: "フル機能"
    apply: ["rules", "rs", "grok", "trend"]
    frequency: "週次"
    max_trades: 4  # 月次

# RS（相対強度）設定（中規模以上で使用）
rs_config:
  benchmark: "SPY"
  sector_etfs: ["XLF", "XLE", "XLV", "XLU", "XLK", "XLI", "XLY", "XLP", "XLC", "XLB", "XLRE"]
  weights: {return_20d: 0.4, return_60d: 0.4, volume_change: 0.2}
  strong_threshold: 1.0  # RS > 1.0 = S&P500をアウトパフォーム

# 「やらない」チェック（全規模共通）
do_nothing_checks:
  - check: "冷却期間"
    condition: "前回売買から規模別冷却期間が経過していない"
    cooldown: {small: "4週", medium: "2週", large: "1週"}
    message: "前回の売買から{期間}です。冷却期間中です"

  - check: "月次上限"
    condition: "今月の売買回数が上限に達している"
    message: "今月は既に売買しています。上限です"

  - check: "レンジ内"
    condition: "PFバランスが目標レンジ内"
    message: "PFはレンジ内。配当+自社株買いの複利が着実にPFを育てています"

  - check: "risk-off"
    condition: "Risk Assessor の判定が risk-off"
    message: "市況がrisk-off判定です。新規購入は見送りが最善です"

  - check: "コスト非効率"
    condition: "PF規模が小規模でセクターローテーション売買"
    message: "PF規模ではセクターローテーション売買は手数料+税で年間リターンを消耗します"

  override: "ユーザーが「それでもやりたい」と言った場合は実行する。理由を説明した上で判断はユーザーに委ねる"
