# Stock Skills Routing — エージェント選択 few-shot
# 網羅不要。代表パターンがあれば Claude Code が柔軟に判断する。

agents:
  screener:
    role: 銘柄探し・スクリーニング実行
    triggers: [探す, スクリーニング, いい株, おすすめ, 割安, 高配当, テーマ, トレンド, 成長株]
  analyst:
    role: 銘柄分析・PF診断・ヘルスチェック・ストレステスト・ウォッチリスト・投資メモ
    # agent.md で内部振り分け: stock-report / stock-portfolio / stress-test / investment-note / watchlist
    triggers: [レポート, 分析, PF, ポートフォリオ, 損益, 買った, 売った, ヘルスチェック, ストレステスト, ウォッチ, メモ, ノート, 予測]
  researcher:
    role: ニュース・Xセンチメント・業界/市場動向・ビジネスモデル調査
    triggers: [ニュース, リサーチ, 深掘り, 業界, マーケット, 市況, センチメント, ビジネスモデル, 動向]
  strategist:
    role: 投資判断・入替提案・ワークフロー設計
    triggers: [入替, リバランス, 改善, 調整, プラン, 戦略, どうすべき, 乗り換え, スワップ]
  reviewer:
    role: 品質・矛盾・リスク・反論チェック（動的LLM選択）
    triggers: []  # 自動挿入: 投資判断を伴う出力時

examples:
  # --- 単一エージェント ---
  - intent: "いい株ある？"
    agent: screener

  - intent: "米国の高配当株を探して"
    agent: screener

  - intent: "AI関連の割安株"
    agent: screener

  - intent: "トヨタってどう？"
    agent: analyst

  - intent: "PF大丈夫？"
    agent: analyst

  - intent: "ストレステストして"
    agent: analyst

  - intent: "ウォッチリストに入れて"
    agent: analyst

  - intent: "メモしておいて"
    agent: analyst

  - intent: "最新ニュース教えて"
    agent: researcher

  - intent: "半導体業界を調べて"
    agent: researcher

  - intent: "入替提案して"
    agent: strategist
    review: true

  - intent: "プランモードで"
    agent: strategist

  # --- 複数エージェント連鎖 ---
  - intent: "今熱いテーマは？"
    agents: [researcher, screener]

  - intent: "市況チェック"
    agents: [analyst, researcher]

  - intent: "PFを改善したい"
    agents: [analyst, strategist]
    review: true

  - intent: "リスク確認して代わりを探して"
    agents: [analyst, screener]
    review: true

  - intent: "半導体を調べて有望な銘柄を探して"
    agents: [researcher, screener]

  - intent: "トヨタを調べてメモして"
    agent: analyst

context_rules:
  - 直前の銘柄を省略されたら補完する
  - 直前のスクリーニング結果の「N位の銘柄」は自動解決する
  - 直前のhealth結果のEXIT銘柄は自動引き継ぐ

ambiguity:
  strategy: ask  # 複数エージェントが同スコアなら短く選択肢を提示
