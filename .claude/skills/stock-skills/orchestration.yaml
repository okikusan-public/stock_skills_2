# Stock Skills Orchestration — 自律修正ループ定義
# エージェント実行後の自動リトライ・エスカレーション・ユーザー確認ルール。
# 分析・レビュー・修正は全て自律で完結。ユーザーに聞くのは最終判断のみ。

retry_rules:
  - condition: "スクリーニング結果が0件"
    action: "条件を緩めて Screener を再起動（preset → alpha, top → 20 等）"
    max_retry: 2

  - condition: "Analyst の分析に必要なデータが取れなかった"
    action: "別のツールで代替取得を試みる（yahoo_finance → WebSearch 等）"
    max_retry: 1

  - condition: "Reviewer が FAIL を返した"
    action: "FAIL 理由を踏まえて該当エージェントを再起動"
    max_retry: 2

  - condition: "Strategist のレコメンドに矛盾がある"
    action: "Health Checker で事実を再確認してから Strategist を再起動"
    max_retry: 1

  - condition: "Grok API エラー（rate_limited / timeout）"
    action: "WebSearch ツールで代替検索"
    max_retry: 1

  - condition: "GraphRAG 未接続"
    action: "コンテキストなしで続行（graceful degradation）"
    max_retry: 0  # リトライ不要、そのまま続行

# ---------------------------------------------------------------------------
# Reviewer 自動挿入 (KIK-659)
# 投資判断を伴う出力は必ず Reviewer を通す。意識ベースではなく仕組みで強制する。
# ---------------------------------------------------------------------------
auto_review:
  trigger:
    # 以下のいずれかに該当 → Reviewer を自動挿入
    - agent_includes: strategist
    - routing_flag: "review: true"
    - output_contains: [売却, 購入, 入替, リバランス, 売るべき, 買うべき, 乗り換え, スワップ]
  action: append_reviewer
  skip_condition: reviewer_already_executed  # 二重実行を防止

escalation:
  - condition: "再試行上限に達した"
    action: "現時点の結果をそのまま提示し、制限事項を明示する"

  - condition: "複数エージェントが矛盾した結果を返した"
    action: "矛盾点を整理してユーザーに判断を委ねる"

human_in_the_loop:
  # ユーザー確認が必要な操作（それ以外は全て自律実行）
  - "売買の最終実行（buy/sell の --yes 確認）"
  - "投資判断の最終承認（Strategist のレコメンド承認）"
  - "差し戻し上限到達時の続行判断"
